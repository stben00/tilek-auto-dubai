# Fly.io deployment config for tilek-auto-upload-bot
# Bot uses Telegram long-polling — no HTTP, no ports.
# Choose a region close to you: fra (Frankfurt), ams (Amsterdam),
# waw (Warsaw), sin (Singapore), iad (Ashburn). For Dubai/UAE → fra or sin.

app = "tilek-auto-bot"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  PYTHONUNBUFFERED = "1"

# IMPORTANT: never auto-stop — long-polling bot must stay connected.
[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"

# HTTP service for the admin panel API (POST /api/admin/contacts).
# Authentication is enforced inside the app via ADMIN_API_SECRET.
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

# Restart policy: Fly defaults to restart on crash, which is what we want.
